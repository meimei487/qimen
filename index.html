<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>奇門遁甲 · 萬事皆可測 — 簡易斷法預測工具</title>
  <meta name="description" content="基於傳統奇門遁甲「萬事皆可測：簡易斷法體系」的互動式預測工具。輸入日期時間，即時計算月將、方位、日時生剋、五行能量。" />
  <meta name="theme-color" content="#080c18" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>" />
</head>
<body>
  <canvas id="particles-bg" aria-hidden="true"></canvas>

  <div id="app">
    <header class="app-header">
      <h1 class="app-title">奇門遁甲 · 萬事皆可測</h1>
      <p class="app-subtitle">簡 易 斷 法 預 測 工 具</p>
    </header>

    <main>
      <!-- 0. 輸入區 -->
      <section id="input-area" aria-label="時間輸入"></section>

      <!-- 1. 五行能量 (氣數) -->
      <section id="energy-area" aria-label="五行能量"></section>

      <!-- 2. 特殊禁忌 (地雷) -->
      <section id="warning-area" aria-label="特殊禁忌"></section>

      <!-- 3. 泊地方位 (出口) -->
      <section id="escape-area" aria-label="泊地方位"></section>

      <!-- 4. 日時生剋 (關係) -->
      <section id="stem-area" aria-label="日時生剋"></section>

      <!-- 5. 貴人/空亡 (細項診斷) -->
      <section id="status-area" aria-label="貴人空亡"></section>

      <!-- 6. 九宮星圖 (地圖) -->
      <section id="palace-area" aria-label="九宮星圖"></section>

      <!-- 7. 大師總評 (指引) -->
      <section id="master-verdict-area" aria-label="大師總評"></section>

      <!-- 8. 詳細資訊 (數據) -->
      <section id="result-area" aria-label="詳細資訊"></section>
    </main>

    <footer class="app-footer">
      <p>參考典籍：《奇門法竅》·《聖靈經》· 傳統月將對照表</p>
      <p>⚠️ 本工具僅供學術研究與娛樂用途，不作任何決策依據。</p>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
